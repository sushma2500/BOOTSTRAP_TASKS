<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.2 - Shadow & Rounded Pill Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
  <div class="container d-flex gap-4 flex-wrap">
    <div class="card shadow p-3 rounded-pill text-center" style="width:200px;">
      <p class="mb-0 fw-bold">Shadow + Rounded Pill</p>
    </div>
    <div class="card shadow-lg p-3 rounded" style="width:200px;">
      <p class="mb-0 fw-bold">Shadow-lg + Rounded</p>
    </div>
    <div class="card shadow-sm p-3" style="width:200px;">
      <p class="mb-0 fw-bold">Shadow-sm (subtle)</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
