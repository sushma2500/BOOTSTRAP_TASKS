<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 10.2 - nav-tabs & nav-pills</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h4 class="mb-3">nav-tabs</h4>
    <ul class="nav nav-tabs mb-3" id="myTab">
      <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab1">Tab 1</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab2">Tab 2</a></li>
      <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab3">Tab 3</a></li>
    </ul>
    <div class="tab-content border p-3 rounded">
      <div class="tab-pane fade show active" id="tab1">Content for Tab 1</div>
      <div class="tab-pane fade" id="tab2">Content for Tab 2</div>
      <div class="tab-pane fade" id="tab3">Content for Tab 3</div>
    </div>

    <h4 class="mt-5 mb-3">nav-pills</h4>
    <ul class="nav nav-pills">
      <li class="nav-item"><a class="nav-link active" href="#">Pill 1</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Pill 2</a></li>
      <li class="nav-item"><a class="nav-link" href="#">Pill 3</a></li>
    </ul>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
