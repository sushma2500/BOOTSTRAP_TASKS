<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.2 - container, row, col-*</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-demo { background:#198754; color:#fff; padding:15px; text-align:center; border-radius:6px; margin-bottom:8px; }
    .row { margin-bottom:12px; }
  </style>
</head>
<body class="p-4">
  <div class="container border p-3">
    <p class="text-muted small">.container</p>
    <div class="row border">
      <p class="text-muted small">.row</p>
      <div class="col-4"><div class="col-demo">.col-4</div></div>
      <div class="col-4"><div class="col-demo">.col-4</div></div>
      <div class="col-4"><div class="col-demo">.col-4</div></div>
    </div>
    <div class="row border mt-2">
      <div class="col-sm-6"><div class="col-demo">.col-sm-6</div></div>
      <div class="col-sm-6"><div class="col-demo">.col-sm-6</div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
