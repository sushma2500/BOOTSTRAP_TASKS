<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3.1 - Responsive Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.col-box { background:#0d6efd; color:#fff; padding:20px; text-align:center; margin-bottom:10px; border-radius:6px; }</style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-3">Responsive Grid: stack / 2-per-row / 3-per-row</h2>
    <div class="row">
      <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 1</div></div>
      <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 2</div></div>
      <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 3</div></div>
    </div>
    <div class="alert alert-info mt-3">
      Resize the browser: <strong>mobile</strong> → stacked | <strong>tablet (md)</strong> → 2 per row | <strong>desktop (lg)</strong> → 3 per row
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
