<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17.2 - Icon-only Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h4 class="mb-3">Icon-only Buttons</h4>
    <div class="d-flex gap-2">
      <button class="btn btn-primary" title="Home"><i class="bi bi-house-fill"></i></button>
      <button class="btn btn-success" title="Add"><i class="bi bi-plus-circle-fill"></i></button>
      <button class="btn btn-danger" title="Delete"><i class="bi bi-trash-fill"></i></button>
      <button class="btn btn-warning" title="Edit"><i class="bi bi-pencil-fill"></i></button>
      <button class="btn btn-info text-white" title="Search"><i class="bi bi-search"></i></button>
      <button class="btn btn-secondary" title="Settings"><i class="bi bi-gear-fill"></i></button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
