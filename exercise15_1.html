<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 15.1 - Border Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h4 class="mb-4">Border Utilities on Images</h4>
    <div class="d-flex flex-wrap gap-4 align-items-center">
      <img src="https://via.placeholder.com/100" class="border border-primary border-3" alt="border-primary">
      <img src="https://via.placeholder.com/100" class="border border-danger border-3 rounded" alt="rounded">
      <img src="https://via.placeholder.com/100" class="border border-success border-3 rounded-circle" alt="circle">
      <img src="https://via.placeholder.com/100" class="border border-warning border-3 rounded-pill" alt="pill">
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
