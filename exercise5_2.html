<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5.2 - Column Reordering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.box{padding:20px;text-align:center;border-radius:6px;color:#fff;}</style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-3">Column Reordering (resize to see effect)</h2>
    <div class="row">
      <div class="col-md-6 order-md-2"><div class="box bg-danger">Visual First (order-md-2 → appears 2nd on md+)</div></div>
      <div class="col-md-6 order-md-1"><div class="box bg-primary mt-2 mt-md-0">Visual Second (order-md-1 → appears 1st on md+)</div></div>
    </div>
    <div class="alert alert-info mt-3">On desktop: Blue appears first, Red second. On mobile: Red appears first (DOM order).</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
