<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 6.1 - Responsive Navbar Flexbox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark p-3">
    <div class="d-flex flex-column flex-md-row w-100 align-items-md-center justify-content-md-between">
      <a class="navbar-brand" href="#">MyBrand</a>
      <div class="d-flex flex-column flex-md-row gap-2 mt-2 mt-md-0">
        <a class="text-white text-decoration-none" href="#">Home</a>
        <a class="text-white text-decoration-none" href="#">About</a>
        <a class="text-white text-decoration-none" href="#">Contact</a>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    <p class="text-muted">Resize the browser: links stack vertically on mobile, horizontal on tablet+.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
