<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 13.1 - Dashboard Colors</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h3 class="mb-4">Dashboard</h3>
    <div class="row g-3">
      <div class="col-md-3"><div class="bg-primary text-white p-4 rounded text-center"><h5>Users</h5><h2>1,240</h2></div></div>
      <div class="col-md-3"><div class="bg-success text-white p-4 rounded text-center"><h5>Sales</h5><h2>$8,400</h2></div></div>
      <div class="col-md-3"><div class="bg-warning text-dark p-4 rounded text-center"><h5>Pending</h5><h2>34</h2></div></div>
      <div class="col-md-3"><div class="bg-danger text-white p-4 rounded text-center"><h5>Errors</h5><h2>7</h2></div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
