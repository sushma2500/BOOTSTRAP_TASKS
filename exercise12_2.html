<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 12.2 - Pricing Section</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
  <div class="container">
    <h2 class="text-center mb-5">Pricing Plans</h2>
    <div class="row g-4 justify-content-center">
      <div class="col-md-4">
        <div class="card text-center p-4 shadow-sm">
          <h4 class="mb-3">Basic</h4>
          <h2 class="mb-4">$9<small class="fs-6 text-muted">/mo</small></h2>
          <ul class="list-unstyled mb-4"><li class="py-2 border-bottom">5 Projects</li><li class="py-2">5GB Storage</li></ul>
          <button class="btn btn-outline-primary mt-2">Get Started</button>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center p-4 shadow bg-primary text-white">
          <h4 class="mb-3">Pro</h4>
          <h2 class="mb-4">$29<small class="fs-6 opacity-75">/mo</small></h2>
          <ul class="list-unstyled mb-4"><li class="py-2 border-bottom border-white">Unlimited Projects</li><li class="py-2">50GB Storage</li></ul>
          <button class="btn btn-light mt-2">Get Started</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
