<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 9.2 - Button Groups & Toggle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h3 class="mb-3">Button Group</h3>
    <div class="btn-group mb-4" role="group">
      <button class="btn btn-primary">Left</button>
      <button class="btn btn-primary">Center</button>
      <button class="btn btn-primary">Right</button>
    </div>

    <h3 class="mb-3">Toggle Buttons (Checkbox)</h3>
    <div class="btn-group" role="group">
      <input type="checkbox" class="btn-check" id="btn1" autocomplete="off">
      <label class="btn btn-outline-primary" for="btn1">Bold</label>
      <input type="checkbox" class="btn-check" id="btn2" autocomplete="off">
      <label class="btn btn-outline-primary" for="btn2">Italic</label>
      <input type="checkbox" class="btn-check" id="btn3" autocomplete="off">
      <label class="btn btn-outline-primary" for="btn3">Underline</label>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
