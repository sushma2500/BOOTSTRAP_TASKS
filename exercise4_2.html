<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4.2 - Four Equal Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>.box{background:#0dcaf0;padding:20px;text-align:center;border-radius:6px;}</style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-3">Four Equal Columns (col-sm-3)</h2>
    <div class="row g-3">
      <div class="col-sm-3"><div class="box">Col 1</div></div>
      <div class="col-sm-3"><div class="box">Col 2</div></div>
      <div class="col-sm-3"><div class="box">Col 3</div></div>
      <div class="col-sm-3"><div class="box">Col 4</div></div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
