<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 14.1 - Display Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h4 class="mb-3">Responsive Display Utilities</h4>
    <div class="d-none d-md-block bg-info text-white p-3 rounded mb-2">
      Visible on tablets and above (d-none d-md-block)
    </div>
    <div class="d-none d-lg-flex bg-success text-white p-3 rounded mb-2 align-items-center gap-2">
      <span>Visible as flex on large screens (d-none d-lg-flex)</span>
    </div>
    <div class="d-md-none bg-warning text-dark p-3 rounded">
      Visible only on mobile (d-md-none)
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
