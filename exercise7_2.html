<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 7.2 - Text Transform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2 class="mb-4">Text Transformation Classes</h2>
    <p class="text-uppercase bg-light p-2 rounded">text-uppercase: this is uppercase</p>
    <p class="text-lowercase bg-light p-2 rounded">text-lowercase: THIS IS LOWERCASE</p>
    <p class="text-capitalize bg-light p-2 rounded">text-capitalize: this is capitalized</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
