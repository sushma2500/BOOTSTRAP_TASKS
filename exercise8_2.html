<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 8.2 - Login Form with form-floating</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card p-4 shadow" style="width:360px;">
    <h4 class="text-center mb-4">Login</h4>
    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="floatEmail" placeholder="name@example.com">
      <label for="floatEmail">Email address</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="floatPassword" placeholder="Password">
      <label for="floatPassword">Password</label>
    </div>
    <button class="btn btn-success w-100">Sign In</button>
    <p class="text-center mt-3 small"><a href="#">Forgot password?</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
