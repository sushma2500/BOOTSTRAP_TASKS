<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 2.2 - Bootstrap JS Plugins</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <div class="container">
    <h2>Bootstrap JS Plugins via bootstrap.bundle.min.js</h2>
    <p>The script below includes Bootstrap JS + Popper.js (bundled).</p>
    <!-- Tooltip example to prove JS is working -->
    <button type="button" class="btn btn-primary mt-3"
      data-bs-toggle="tooltip" data-bs-placement="top" title="JS Plugins are working!">
      Hover Me (Tooltip)
    </button>
    <button class="btn btn-secondary mt-3 ms-2" data-bs-toggle="collapse" data-bs-target="#demo">
      Toggle Collapse
    </button>
    <div class="collapse mt-3" id="demo">
      <div class="card card-body">Bootstrap JavaScript plugins are active!</div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Initialize tooltips
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
  </script>
</body>
</html>
