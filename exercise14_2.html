<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 14.2 - Responsive Sidebar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar: hidden on mobile, shown on md+ -->
    <div class="d-none d-md-block bg-dark text-white p-3" style="min-width:200px; min-height:100vh;">
      <h5>Sidebar</h5>
      <ul class="list-unstyled"><li class="py-1">Dashboard</li><li class="py-1">Reports</li><li class="py-1">Settings</li></ul>
    </div>
    <div class="flex-grow-1 p-4">
      <h4>Main Content</h4>
      <p>The sidebar is only visible on tablets and above. Resize to see it disappear on mobile.</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
